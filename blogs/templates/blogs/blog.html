{%extends 'blogs/base.html'%}
{% load my_tags_blog %}
{% block content %}
<div class="row">
    <div class="col">
        <div class="card mb-4 box-shadow">
            <div class="card-header">
                <h4 class="my-0 font-weight-normal">Заголовок: {{ blog.name }}</h4>
            </div>
            <div class="card-body">
                <div class="col-auto d-none d-lg-block">
                    <p class="card-text mb-auto"><img src="{{ blog.preview | media_filter }}" class="img-thumbnail"
                                                      width="300" alt="Картинка блога"> {{ blog.content }} </p>
                    <div class="flex-container checkbox-row">
                        <input type="checkbox" name="publication_attribute" id="id_publication_attribute" checked="">
                        <label class="vCheckboxLabel" for="id_publication_attribute"> Статус публикации </label>
                    </div>
                    <p class="card-text">{{ blog.created_at }}</p>
                    <p class="card-text"> Количество просмотров: {{ blog.number_of_views }}</p>
                </div>
                <a role="button" class="btn btn-lg btn-block btn-outline-primary" href="{% url 'blogs:blog-list' %}">Назад</a>
            </div>
        </div>
    </div>
</div>


{% endblock %}
