{%extends 'blogs/base.html'%}
{% load my_tags_blog %}
{% block content %}
<div class="row text-center">
    <a role="button" class="btn btn-lg btn-block btn-outline-primary" href="{% url 'blogs:blog_create' %}">Создать
        блог</a>
    {% for blog in blogs %}
    <div class="col-12">
        <div class="card mb-4 box-shadow">
            <div class="card-header">
                <h4 class="my-0 font-weight-normal"><img src="{{ blog.preview | media_filter }}" class="img-thumbnail"
                                                         width="100"> {{ blog.name }}</h4>
                <a role="button" class="btn btn-lg btn-block btn-outline-primary" href="{% url 'blogs:blog' blog.pk %}">Подробнее</a>
                <a role="button" class="btn btn-lg btn-block btn-outline-primary" href="{% url 'blogs:blog-update' blog.pk %}">Редактировать</a>
                <a role="button" class="btn btn-lg btn-block btn-outline-primary" href="{% url 'blogs:blog-delete' blog.pk %}">Удалить</a>
            </div>
            <div class="card-body">
                <div class="card mb-4 box-shadow">
                    <p class="card-text">{{ blog.created_at }}</p>
                    <p class="card-text"> Количество просмотров: {{ blog.number_of_views }}</p>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
