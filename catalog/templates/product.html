{%extends 'base.html'%}
{% load my_tags %}
{% block content %}
<div class="row text-center">
    <div class="col-12">
        <div class="card mb-10 box-shadow">
            <div class="card-header">
                <h4 class="my-0 font-weight-normal">Наименование: {{ product.name }}</h4>
            </div>
            <div class="card-body">
                <h2 class="card-title pricing-card-title">цена {{ product.price }} руб.</h2>
                <ul class="list-unstyled mt-3 mb-4 text-start m-3">
                    <li> <img src="{{ product.picture | media_filter }}" class="img-thumbnail" width="300"></li>
                    <li> Описание: {{ product.description }}</li>
                    <li> Дата создания: {{ product.created_at }}</li>
                </ul>
                <a role="button" class="btn btn-lg btn-block btn-outline-primary" href="{% url 'catalog:home' %}">Назад</a>
                <button type="button" class="btn btn-lg btn-block btn-outline-primary">Купить</button>
                <a role="button" class="btn btn-lg btn-block btn-outline-primary" href="{% url 'catalog:products' product.pk %}">Показать продукты этой категории</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
